<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tables">
<meta name="theme-color" content="#f0c040">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Tables Trainer • 22–29</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131f;
    --border: #1e1e30;
    --accent: #f0c040;
    --accent2: #60e0c0;
    --text: #e8e8f0;
    --muted: #6060a0;
    --correct: #40c080;
    --wrong: #f04060;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Install Banner */
  #installBanner {
    display: none;
    position: fixed;
    bottom: calc(16px + var(--safe-bot));
    left: 16px; right: 16px;
    background: var(--accent);
    color: #000;
    border-radius: 14px;
    padding: 14px 16px;
    z-index: 999;
    font-weight: 700;
    font-size: 0.9rem;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(240,192,64,0.3);
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  #installBanner.show { display: flex; }
  #installBanner span { flex: 1; }

  .install-btn {
    background: #000;
    color: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    cursor: pointer;
  }

  .dismiss-btn {
    background: transparent;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: #000;
    padding: 4px;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 16px 14px 100px;
  }

  header {
    text-align: center;
    padding: 20px 0 20px;
  }

  header h1 {
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1.1;
  }

  header p {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Bottom Nav (app-like) */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(13,13,26,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bot);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 12px 4px 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
    letter-spacing: 0.3px;
  }

  .nav-btn .nav-icon { font-size: 1.3rem; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(240,192,64,0.6)); }

  /* Tab content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* LEARN */
  .table-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .table-btn {
    padding: 14px 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    touch-action: manipulation;
  }

  .table-btn:active { transform: scale(0.95); }
  .table-btn.selected { background: var(--accent); color: #000; border-color: var(--accent); }

  .table-display {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .table-header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 14px 18px;
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }

  .table-row {
    display: flex;
    align-items: center;
    padding: 11px 18px;
    border-bottom: 1px solid rgba(30,30,48,0.6);
    animation: rowIn 0.3s ease forwards;
    opacity: 0;
    font-family: 'JetBrains Mono', monospace;
  }

  .table-row:last-child { border-bottom: none; }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .row-index { width: 28px; font-size: 0.72rem; color: var(--muted); }
  .row-expr { flex: 1; font-size: 0.95rem; color: var(--text); }
  .row-eq { color: var(--muted); margin: 0 6px; }
  .row-result { font-size: 1.05rem; font-weight: 700; color: var(--accent2); }

  /* QUIZ shared */
  .quiz-settings {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .setting-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .setting-group { flex: 1; min-width: 130px; }

  .setting-select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    padding: 10px 12px;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .start-quiz-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    margin-bottom: 16px;
    touch-action: manipulation;
  }

  .start-quiz-btn:active { transform: scale(0.97); background: #ffd050; }

  .score-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }

  .score-item {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }

  .score-num { font-size: 1.4rem; font-weight: 700; }
  .score-lbl { font-size: 0.62rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .score-item.c .score-num { color: var(--correct); }
  .score-item.w .score-num { color: var(--wrong); }
  .score-item.t .score-num { color: var(--accent); }

  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 18px;
    text-align: center;
    display: none;
  }

  .quiz-card.active { display: block; }

  .quiz-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .quiz-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .quiz-question {
    font-size: clamp(2.2rem, 9vw, 3.5rem);
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -2px;
  }

  .quiz-question span { color: var(--accent); }
  .quiz-subtitle {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 22px;
    letter-spacing: 2px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .option-btn {
    padding: 18px 8px;
    background: #0d0d1a;
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }

  .option-btn:active:not(:disabled) { transform: scale(0.95); }
  .option-btn.correct { border-color: var(--correct); background: rgba(64,192,128,0.12); color: var(--correct); }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(240,64,96,0.1); color: var(--wrong); }
  .option-btn:disabled { cursor: default; }

  .quiz-feedback {
    min-height: 36px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }

  .quiz-feedback.correct { color: var(--correct); }
  .quiz-feedback.wrong { color: var(--wrong); }

  .next-btn {
    padding: 13px 36px;
    background: transparent;
    border: 2px solid var(--accent);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
    touch-action: manipulation;
  }

  .next-btn:active { background: var(--accent); color: #000; }
  .next-btn.visible { display: inline-block; }

  /* Type mode */
  .type-input {
    width: 100%;
    background: #0d0d1a;
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.2rem;
    font-weight: 700;
    padding: 18px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
    -webkit-appearance: none;
  }

  .type-input:focus { border-color: var(--accent); }
  .type-input.correct-input { border-color: var(--correct); }
  .type-input.wrong-input { border-color: var(--wrong); }

  .submit-btn {
    padding: 13px 32px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
    margin-bottom: 2px;
  }

  .submit-btn:active { transform: scale(0.96); background: #ffd050; }

  /* Results */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 20px;
    text-align: center;
    display: none;
  }

  .results-card.active { display: block; }
  .results-emoji { font-size: 3rem; margin-bottom: 10px; }
  .results-title { font-size: 1.6rem; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
  .results-score { font-size: 0.95rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 22px; }

  .retry-btn {
    padding: 13px 32px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    touch-action: manipulation;
  }

  .retry-btn:active { background: #ffd050; }

  /* Streak widget */
  .streak-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .streak-fire { font-size: 1.2rem; }
  .streak-count { font-weight: 700; color: var(--accent); font-size: 1rem; }
</style>
</head>
<body>

<!-- Install Banner -->
<div id="installBanner">
  <span>📲 Add to Home Screen!</span>
  <button class="install-btn" id="installBtn">Install</button>
  <button class="dismiss-btn" onclick="dismissInstall()">✕</button>
</div>

<div class="container">
  <header>
    <h1>Tables 22–29</h1>
    <p>Multiplication Trainer • ×1–15</p>
  </header>

  <!-- Streak -->
  <div class="streak-bar">
    <span class="streak-fire">🔥</span>
    <span>Streak:</span>
    <span class="streak-count" id="streakCount">0</span>
    <span>days</span>
    &nbsp;|&nbsp;
    <span>Today:</span>
    <span class="streak-count" id="todayCount">0</span>
    <span>done</span>
  </div>

  <!-- LEARN TAB -->
  <div class="tab-content active" id="tab-learn">
    <div class="table-selector" id="tableSelector"></div>
    <div class="table-display" id="tableDisplay">
      <div class="table-header">Select a table above ↑</div>
    </div>
  </div>

  <!-- MCQ TAB -->
  <div class="tab-content" id="tab-mcq">
    <div class="quiz-settings">
      <div class="setting-group">
        <div class="setting-label">Table</div>
        <select class="setting-select" id="mcqRange">
          <option value="all">All (22–29)</option>
          <option value="22,23,24,25">22–25</option>
          <option value="26,27,28,29">26–29</option>
          <option value="22">22</option><option value="23">23</option>
          <option value="24">24</option><option value="25">25</option>
          <option value="26">26</option><option value="27">27</option>
          <option value="28">28</option><option value="29">29</option>
        </select>
      </div>
      <div class="setting-group">
        <div class="setting-label">Questions</div>
        <select class="setting-select" id="mcqCount">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="30">30</option>
          <option value="all">All</option>
        </select>
      </div>
    </div>
    <button class="start-quiz-btn" onclick="startMCQ()">▶ Start MCQ Quiz</button>

    <div class="score-bar" id="mcqScoreBar" style="display:none">
      <div class="score-item c"><div class="score-num" id="mcqCorrect">0</div><div class="score-lbl">Correct</div></div>
      <div class="score-item w"><div class="score-num" id="mcqWrong">0</div><div class="score-lbl">Wrong</div></div>
      <div class="score-item t"><div class="score-num" id="mcqTotal">0</div><div class="score-lbl">Total</div></div>
    </div>

    <div class="quiz-card" id="mcqCard">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="mcqProgressFill"></div></div>
      <div class="quiz-question" id="mcqQuestion">—</div>
      <div class="quiz-subtitle" id="mcqSubtitle">WHAT IS THE ANSWER?</div>
      <div class="options-grid" id="mcqOptions"></div>
      <div class="quiz-feedback" id="mcqFeedback"></div>
      <button class="next-btn" id="mcqNext" onclick="nextMCQ()">Next →</button>
    </div>

    <div class="results-card" id="mcqResults">
      <div class="results-emoji" id="mcqEmoji">🎉</div>
      <div class="results-title" id="mcqResultTitle">Well done!</div>
      <div class="results-score" id="mcqResultScore"></div>
      <button class="retry-btn" onclick="startMCQ()">Try Again</button>
    </div>
  </div>

  <!-- TYPE TAB -->
  <div class="tab-content" id="tab-type">
    <div class="quiz-settings">
      <div class="setting-group">
        <div class="setting-label">Table</div>
        <select class="setting-select" id="typeRange">
          <option value="all">All (22–29)</option>
          <option value="22,23,24,25">22–25</option>
          <option value="26,27,28,29">26–29</option>
          <option value="22">22</option><option value="23">23</option>
          <option value="24">24</option><option value="25">25</option>
          <option value="26">26</option><option value="27">27</option>
          <option value="28">28</option><option value="29">29</option>
        </select>
      </div>
      <div class="setting-group">
        <div class="setting-label">Questions</div>
        <select class="setting-select" id="typeCount">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="30">30</option>
        </select>
      </div>
    </div>
    <button class="start-quiz-btn" onclick="startType()">▶ Start Type Quiz</button>

    <div class="score-bar" id="typeScoreBar" style="display:none">
      <div class="score-item c"><div class="score-num" id="typeCorrect">0</div><div class="score-lbl">Correct</div></div>
      <div class="score-item w"><div class="score-num" id="typeWrong">0</div><div class="score-lbl">Wrong</div></div>
      <div class="score-item t"><div class="score-num" id="typeTotal">0</div><div class="score-lbl">Total</div></div>
    </div>

    <div class="quiz-card" id="typeCard">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="typeProgressFill"></div></div>
      <div class="quiz-question" id="typeQuestion">—</div>
      <div class="quiz-subtitle">TYPE YOUR ANSWER</div>
      <input type="number" inputmode="numeric" class="type-input" id="typeInput" placeholder="?" onkeydown="handleTypeKey(event)">
      <button class="submit-btn" onclick="submitType()">Submit ↵</button>
      <div class="quiz-feedback" id="typeFeedback"></div>
      <button class="next-btn" id="typeNext" onclick="nextType()">Next →</button>
    </div>

    <div class="results-card" id="typeResults">
      <div class="results-emoji" id="typeEmoji">🎉</div>
      <div class="results-title" id="typeResultTitle">Well done!</div>
      <div class="results-score" id="typeResultScore"></div>
      <button class="retry-btn" onclick="startType()">Try Again</button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-learn" onclick="switchTab('learn')">
    <span class="nav-icon">📖</span>Learn
  </button>
  <button class="nav-btn" id="nav-mcq" onclick="switchTab('mcq')">
    <span class="nav-icon">🎯</span>MCQ
  </button>
  <button class="nav-btn" id="nav-type" onclick="switchTab('type')">
    <span class="nav-icon">⌨️</span>Type
  </button>
</nav>

<script>
// ── Register Service Worker ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── PWA Install Prompt ────────────────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('installDismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
});

document.getElementById('installBtn').onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') localStorage.setItem('installDismissed', '1');
    deferredPrompt = null;
  }
  document.getElementById('installBanner').classList.remove('show');
};

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
}

// ── Streak Tracking ───────────────────────────────────────────────────────
function updateStreak() {
  const today = new Date().toDateString();
  const lastDay = localStorage.getItem('lastDay');
  let streak = parseInt(localStorage.getItem('streak') || '0');
  let todayCount = parseInt(localStorage.getItem('todayCount') || '0');

  if (lastDay !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (lastDay === yesterday) streak++;
    else if (!lastDay) streak = 1;
    else streak = 1;
    todayCount = 0;
    localStorage.setItem('lastDay', today);
    localStorage.setItem('streak', streak);
    localStorage.setItem('todayCount', 0);
  }

  document.getElementById('streakCount').textContent = streak;
  document.getElementById('todayCount').textContent = todayCount;
}

function incrementToday() {
  let c = parseInt(localStorage.getItem('todayCount') || '0') + 1;
  localStorage.setItem('todayCount', c);
  const today = new Date().toDateString();
  if (!localStorage.getItem('lastDay')) localStorage.setItem('lastDay', today);
  updateStreak();
}

updateStreak();

// ── Data ──────────────────────────────────────────────────────────────────
const TABLES = [22,23,24,25,26,27,28,29];
const MULTS = Array.from({length:15}, (_,i) => i+1);

function getAll(tables) {
  const q = [];
  tables.forEach(t => MULTS.forEach(m => q.push({t, m, ans: t*m})));
  return q;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getTables(v) {
  if (v === 'all') return TABLES;
  return v.split(',').map(Number);
}

// ── Tab switching ─────────────────────────────────────────────────────────
function switchTab(name) {
  ['learn','mcq','type'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('nav-'+t).classList.toggle('active', t===name);
  });
}

// ── Learn ─────────────────────────────────────────────────────────────────
const sel = document.getElementById('tableSelector');
TABLES.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'table-btn';
  btn.textContent = t;
  btn.onclick = () => showTable(t, btn);
  sel.appendChild(btn);
});

function showTable(t, btn) {
  document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const d = document.getElementById('tableDisplay');
  let html = `<div class="table-header">Table of ${t}</div>`;
  MULTS.forEach((m,i) => {
    html += `<div class="table-row" style="animation-delay:${i*0.03}s">
      <span class="row-index">${m}.</span>
      <span class="row-expr">${t} × ${m}<span class="row-eq">=</span></span>
      <span class="row-result">${t*m}</span>
    </div>`;
  });
  d.innerHTML = html;
}

// ── MCQ ───────────────────────────────────────────────────────────────────
let mcqQ=[], mcqIdx=0, mcqC=0, mcqW=0, mcqDone=false;

function startMCQ() {
  const range = getTables(document.getElementById('mcqRange').value);
  const cv = document.getElementById('mcqCount').value;
  let all = shuffle(getAll(range));
  const count = cv==='all' ? all.length : Math.min(parseInt(cv), all.length);
  mcqQ = all.slice(0, count);
  mcqIdx=0; mcqC=0; mcqW=0;
  document.getElementById('mcqScoreBar').style.display='flex';
  document.getElementById('mcqCard').classList.add('active');
  document.getElementById('mcqResults').classList.remove('active');
  updateMCQScore();
  loadMCQ();
}

function loadMCQ() {
  mcqDone = false;
  const q = mcqQ[mcqIdx];
  document.getElementById('mcqProgressFill').style.width = (mcqIdx/mcqQ.length*100)+'%';
  document.getElementById('mcqQuestion').innerHTML = `${q.t} <span>×</span> ${q.m}`;
  document.getElementById('mcqSubtitle').textContent = `Q ${mcqIdx+1} of ${mcqQ.length}`;
  document.getElementById('mcqFeedback').textContent = '';
  document.getElementById('mcqFeedback').className = 'quiz-feedback';
  document.getElementById('mcqNext').classList.remove('visible');

  const correct = q.ans;
  const wrong = new Set();
  while (wrong.size < 3) {
    const delta = (Math.random()<0.5?1:-1)*(Math.floor(Math.random()*5)+1);
    const w = correct + delta*(Math.random()<0.5?q.t:q.m);
    if (w!==correct && w>0) wrong.add(w);
  }
  const opts = shuffle([correct, ...wrong]);
  const grid = document.getElementById('mcqOptions');
  grid.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = o;
    btn.onclick = () => answerMCQ(btn, o, correct);
    grid.appendChild(btn);
  });
}

function answerMCQ(btn, chosen, correct) {
  if (mcqDone) return;
  mcqDone = true;
  document.querySelectorAll('#mcqOptions .option-btn').forEach(b => {
    b.disabled = true;
    if (parseInt(b.textContent)===correct) b.classList.add('correct');
  });
  const fb = document.getElementById('mcqFeedback');
  if (chosen===correct) {
    btn.classList.add('correct');
    fb.textContent='✓ Correct!'; fb.className='quiz-feedback correct';
    mcqC++;
  } else {
    btn.classList.add('wrong');
    fb.textContent=`✗ Wrong! Answer: ${correct}`; fb.className='quiz-feedback wrong';
    mcqW++;
  }
  incrementToday();
  updateMCQScore();
  document.getElementById('mcqNext').classList.add('visible');
}

function nextMCQ() {
  mcqIdx++;
  if (mcqIdx>=mcqQ.length) showMCQResults();
  else loadMCQ();
}

function updateMCQScore() {
  document.getElementById('mcqCorrect').textContent = mcqC;
  document.getElementById('mcqWrong').textContent = mcqW;
  document.getElementById('mcqTotal').textContent = mcqQ.length;
}

function showMCQResults() {
  document.getElementById('mcqCard').classList.remove('active');
  const res = document.getElementById('mcqResults');
  res.classList.add('active');
  const pct = Math.round(mcqC/mcqQ.length*100);
  const emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  const title = pct>=90?'Excellent!':pct>=70?'Great job!':pct>=50?'Keep going!':'More practice!';
  document.getElementById('mcqEmoji').textContent = emoji;
  document.getElementById('mcqResultTitle').textContent = title;
  document.getElementById('mcqResultScore').textContent = `${mcqC} / ${mcqQ.length} correct (${pct}%)`;
}

// ── Type Quiz ─────────────────────────────────────────────────────────────
let typeQ=[], typeIdx=0, typeC=0, typeW=0, typeDone=false;

function startType() {
  const range = getTables(document.getElementById('typeRange').value);
  const cv = document.getElementById('typeCount').value;
  let all = shuffle(getAll(range));
  const count = Math.min(parseInt(cv), all.length);
  typeQ = all.slice(0,count);
  typeIdx=0; typeC=0; typeW=0;
  document.getElementById('typeScoreBar').style.display='flex';
  document.getElementById('typeCard').classList.add('active');
  document.getElementById('typeResults').classList.remove('active');
  updateTypeScore();
  loadType();
}

function loadType() {
  typeDone = false;
  const q = typeQ[typeIdx];
  document.getElementById('typeProgressFill').style.width = (typeIdx/typeQ.length*100)+'%';
  document.getElementById('typeQuestion').innerHTML = `${q.t} <span style="color:var(--accent)">×</span> ${q.m} = ?`;
  document.getElementById('typeFeedback').textContent = '';
  document.getElementById('typeFeedback').className = 'quiz-feedback';
  document.getElementById('typeNext').classList.remove('visible');
  const inp = document.getElementById('typeInput');
  inp.value=''; inp.className='type-input'; inp.disabled=false;
  setTimeout(() => inp.focus(), 100);
}

function handleTypeKey(e) { if (e.key==='Enter') submitType(); }

function submitType() {
  if (typeDone) return;
  const inp = document.getElementById('typeInput');
  const val = parseInt(inp.value);
  if (isNaN(val)) return;
  typeDone = true;
  inp.disabled = true;
  const q = typeQ[typeIdx];
  const fb = document.getElementById('typeFeedback');
  if (val===q.ans) {
    inp.classList.add('correct-input');
    fb.textContent='✓ Correct!'; fb.className='quiz-feedback correct';
    typeC++;
  } else {
    inp.classList.add('wrong-input');
    fb.textContent=`✗ Wrong! Answer: ${q.ans}`; fb.className='quiz-feedback wrong';
    typeW++;
  }
  incrementToday();
  updateTypeScore();
  document.getElementById('typeNext').classList.add('visible');
}

function nextType() {
  typeIdx++;
  if (typeIdx>=typeQ.length) showTypeResults();
  else loadType();
}

function updateTypeScore() {
  document.getElementById('typeCorrect').textContent = typeC;
  document.getElementById('typeWrong').textContent = typeW;
  document.getElementById('typeTotal').textContent = typeQ.length;
}

function showTypeResults() {
  document.getElementById('typeCard').classList.remove('active');
  const res = document.getElementById('typeResults');
  res.classList.add('active');
  const pct = Math.round(typeC/typeQ.length*100);
  const emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  const title = pct>=90?'Excellent!':pct>=70?'Great job!':pct>=50?'Keep going!':'More practice!';
  document.getElementById('typeEmoji').textContent = emoji;
  document.getElementById('typeResultTitle').textContent = title;
  document.getElementById('typeResultScore').textContent = `${typeC} / ${typeQ.length} correct (${pct}%)`;
}
</script>
